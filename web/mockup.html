<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-8 flex justify-center items-start min-h-screen">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
        <!-- Header -->
        <div class="p-6 border-b border-slate-100">
            <h2 class="text-xl font-bold text-slate-900">12 High Street</h2>
            <p class="text-sm text-slate-500">London, SW1A 1AA</p>
        </div>

        <!-- History Summary -->
        <div class="p-6 space-y-4">
            <div class="bg-blue-50 rounded-xl p-4 flex items-center justify-between border border-blue-100">
                <div>
                    <p class="text-xs font-bold text-blue-600 uppercase tracking-wider">Price Change</p>
                    <p class="text-lg font-bold text-blue-900">+£120,000 (+40.0%)</p>
                </div>
                <div class="text-right">
                    <p class="text-xs font-bold text-blue-600 uppercase tracking-wider">Overall Return</p>
                    <p class="text-lg font-bold text-blue-900">+5.2% p.a.</p>
                </div>
            </div>

            <!-- Simulator -->
            <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200">
                <h3 class="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    Sale Price Simulator
                </h3>

                <div class="space-y-6">
                    <!-- Input & Slider -->
                    <div>
                        <div class="flex justify-between items-end mb-2">
                            <label class="text-xs font-semibold text-slate-500 uppercase">Projected Sale Price</label>
                            <span class="text-xl font-black text-blue-600">£450,000</span>
                        </div>
                        <input type="range" min="300000" max="600000" value="450000" class="w-full h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer accent-blue-600">
                        <div class="flex justify-between text-[10px] font-bold text-slate-400 mt-1">
                            <span>£300k (Last Price)</span>
                            <span>£600k</span>
                        </div>
                    </div>

                    <!-- Results Grid -->
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white p-3 rounded-xl shadow-sm border border-emerald-100">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Estimated Profit</p>
                            <p class="text-lg font-bold text-emerald-600">+£150,000</p>
                            <p class="text-xs font-medium text-emerald-500">+50.0% total</p>
                        </div>
                        <div class="bg-white p-3 rounded-xl shadow-sm border border-blue-100">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Annual Return</p>
                            <p class="text-lg font-bold text-blue-600">+8.4%</p>
                            <p class="text-xs font-medium text-slate-500">Held for 5.2 years</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
